name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (just for reference, actual version comes from package.json)'
        required: false
        default: 'v1.0.10'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Inject Cloudflare Accounts Secret
        run: |
          echo "${{ secrets.CLOUDFLARE_ACCOUNTS }}" > cloudflare_accounts.txt
        shell: bash

      - name: Build and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:ci
